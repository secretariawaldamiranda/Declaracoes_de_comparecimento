<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Declarações Escolares - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }

        /* CONFIGURAÇÕES DE IMPRESSÃO - A4 REAL */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            
            body { background: white; margin: 0; padding: 0; }
            
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            .print-page { 
                width: 210mm; 
                height: 297mm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                position: relative; 
                background: white;
                box-sizing: border-box;
                page-break-after: always;
            }
            
            .header-print-area {
                padding-top: 10mm;
                width: 100%;
            }

            .content-print-area {
                padding: 0 25mm; 
                flex-grow: 1; 
                display: flex;
                flex-direction: column;
            }

            .footer-print-area {
                width: 100%;
                padding-bottom: 10mm; 
            }
        }

        .print-only { display: none; }
        
        .a4-preview { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            margin: 2rem auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
        }

        .img-full { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        .signature-img { 
            max-height: 45px; 
            width: auto; 
            display: block; 
            margin: 0 auto; 
        }
    </style>
</head>
<body>

    <!-- Interface Lateral Minimalista -->
    <div class="no-print fixed left-0 top-0 h-full w-80 bg-white border-r border-slate-200 shadow-xl p-8 z-50 overflow-y-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Escola Digital</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Automação Inteligente ✨</p>
        </header>
        
        <div class="space-y-8">
            
            <!-- Configurações (Data e Turno automáticos) -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">1. Documento</h3>
                <div class="grid grid-cols-1 gap-4">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Data (Hoje)</label>
                        <input type="date" id="docDate" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Turno (Atual)</label>
                        <select id="docShift" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50 font-medium">
                            <option value="matutino">Matutino</option>
                            <option value="vespertino">Vespertino</option>
                            <option value="noturno">Noturno</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Pesquisa -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">2. Aluno</h3>
                <div class="relative">
                    <input type="text" id="searchBox" placeholder="Pesquisar registro..." class="w-full border-2 border-slate-100 rounded-2xl p-4 text-base focus:border-blue-500 outline-none transition-all shadow-sm disabled:bg-slate-50 disabled:cursor-not-allowed" disabled>
                    <div id="results" class="absolute z-50 left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-h-72 overflow-y-auto hidden"></div>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100">
                <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    IMPRIMIR
                </button>
            </div>
            
            <!-- Créditos Discretos -->
            <div class="pt-10 text-[9px] text-slate-300 text-center uppercase tracking-widest">
                Gerador de Comparecimento v5.0
            </div>
        </div>
    </div>

    <!-- Visualização do Documento -->
    <div class="lg:ml-80 flex justify-center no-print min-h-screen pb-10">
        <div id="canvas" class="a4-preview hidden">
            <div id="vHeader"></div>
            
            <div class="p-[15mm_25mm] flex-grow">
                <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 10mm;">DECLARAÇÃO</div>
                <div id="vBody" class="text-xl leading-[1.8] text-justify text-slate-800"></div>
                <div id="vDate" class="text-right text-lg mt-12"></div>
                
                <!-- Área de Assinatura (Configurada para ficar por trás da linha) -->
                <div class="mt-32 flex flex-col items-center">
                    <div id="vSign" class="relative z-0 h-[45px] flex items-end -mb-[18px]"></div>
                    <div class="w-80 border-t border-black relative z-10"></div>
                    <div class="text-center mt-3">
                        <p class="font-bold uppercase text-lg">Elaine Lopes da Luz Almeida</p>
                        <p class="text-slate-500">Diretora</p>
                    </div>
                </div>
            </div>

            <div id="vFooter"></div>
        </div>

        <!-- Estado Vazio -->
        <div id="empty-state" class="flex flex-col items-center justify-center text-slate-300 mt-32">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-4 opacity-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" />
            </svg>
            <p class="text-xl font-medium opacity-40 italic">Inicie a pesquisa para gerar o documento</p>
        </div>
    </div>

    <!-- ÁREA DE IMPRESSÃO REAL -->
    <div class="print-only print-page">
        <div id="pHeader" class="header-print-area"></div>
        <div class="content-print-area">
            <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 10mm;">DECLARAÇÃO</div>
            <div id="pBody" class="text-[14pt] leading-[1.8] text-justify"></div>
            <div id="pDate" class="text-right text-[14pt] mt-12"></div>
            
            <div class="flex flex-col items-center" style="margin-top: 40mm;">
                <div id="pSign" class="relative z-0 h-[45px] flex items-end -mb-[18px]"></div>
                <div class="w-80 border-t border-black relative z-10"></div>
                <div class="text-center mt-3">
                    <p class="font-bold uppercase text-[14pt]">Elaine Lopes da Luz Almeida</p>
                    <p class="text-[12pt]">Diretora</p>
                </div>
            </div>
        </div>
        
        <div id="pFooter" class="footer-print-area"></div>
    </div>

    <script>
        let db = [];
        let selected = null;
        let imgs = { h: 'cabecalho.png', s: 'assinatura.png', f: 'rodape.png' };

        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            // 1. Detectar Data e Turno imediatamente
            const agora = new Date();
            
            // Ajuste para formato YYYY-MM-DD local
            const offset = agora.getTimezoneOffset();
            const dataLocal = new Date(agora.getTime() - (offset*60*1000)).toISOString().split('T')[0];
            $('docDate').value = dataLocal;

            const hora = agora.getHours();
            let turno = "noturno";
            if (hora >= 5 && hora < 12) turno = "matutino";
            else if (hora >= 12 && hora < 18) turno = "vespertino";
            $('docShift').value = turno;

            // 2. Carregar recursos automáticos
            checkAndLoadDefaultImages();
            checkAndLoadDefaultCSV();
        };

        function checkAndLoadDefaultCSV() {
            fetch('CUBO.CSV')
                .then(response => response.text())
                .then(text => parseCSV(text))
                .catch(() => console.error("Base automática não encontrada."));
        }

        function parseCSV(text) {
            const lines = text.split('\n');
            db = lines.slice(1).map(l => {
                const c = l.split(';');
                return c.length >= 2 ? { a: c[0].trim(), m: c[1].trim() } : null;
            }).filter(Boolean);
            
            if (db.length > 0) {
                $('searchBox').disabled = false;
                $('searchBox').placeholder = `Pesquisar em ${db.length} registros...`;
            }
        }

        function checkAndLoadDefaultImages() {
            const targets = [{ key: 'h', path: 'cabecalho.png' }, { key: 'f', path: 'rodape.png' }, { key: 's', path: 'assinatura.png' }];
            targets.forEach(t => {
                const img = new Image();
                img.onload = () => render();
                img.onerror = () => { imgs[t.key] = ''; render(); };
                img.src = t.path;
            });
        }

        $('searchBox').oninput = function() {
            const val = this.value.toLowerCase();
            const resDiv = $('results');
            if (val.length < 2) return resDiv.classList.add('hidden');
            const matches = db.filter(i => i.a.toLowerCase().includes(val) || i.m.toLowerCase().includes(val)).slice(0, 5);
            resDiv.innerHTML = '';
            resDiv.classList.toggle('hidden', matches.length === 0);
            matches.forEach(item => {
                const d = document.createElement('div');
                d.className = "p-4 hover:bg-blue-50 cursor-pointer border-b last:border-0 text-sm transition-colors";
                d.innerHTML = `<div><b class="text-slate-800 uppercase">${item.a}</b></div><div class="text-[10px] text-slate-400 uppercase font-bold">Mãe: ${item.m}</div>`;
                d.onclick = () => {
                    selected = item;
                    resDiv.classList.add('hidden');
                    $('searchBox').value = item.a;
                    $('canvas').classList.remove('hidden');
                    $('empty-state').classList.add('hidden');
                    render();
                };
                resDiv.appendChild(d);
            });
        };

        function render() {
            if (!selected) return;
            const dateVal = $('docDate').value;
            const shift = $('docShift').value;
            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const [y, m, d] = dateVal.split('-');
            const dataExtenso = `${d} de ${meses[parseInt(m)-1]} de ${y}`;
            
            const conteudo = `Declaro para os devidos fins legais que, <strong>${selected.m}</strong>, compareceu nesta Unidade Escolar no dia <strong>${dataExtenso}</strong>, no turno <strong>${shift}</strong>, para resolver assuntos relacionados a <strong>${selected.a}</strong>.
            <p style="margin-top: 35px;">Por ser verdade assino a presente declaração.</p>`;
            
            const linhaData = `Formosa-GO, ${dataExtenso}.`;

            ['v', 'p'].forEach(prefix => {
                $(prefix + 'Body').innerHTML = conteudo;
                $(prefix + 'Date').innerText = linhaData;
                $(prefix + 'Header').innerHTML = imgs.h ? `<img src="${imgs.h}" class="img-full">` : '';
                $(prefix + 'Footer').innerHTML = imgs.f ? `<img src="${imgs.f}" class="img-full">` : '';
                $(prefix + 'Sign').innerHTML = imgs.s ? `<img src="${imgs.s}" class="signature-img">` : '';
            });
        }

        $('docDate').onchange = () => render();
        $('docShift').onchange = () => render();
    </script>
</body>
</html>
