<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Declarações Escolares - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            body { background: white; margin: 0; padding: 0; }
            @page { size: A4; margin: 0; }
            .print-page { width: 210mm; height: 297mm; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: white; box-sizing: border-box; page-break-after: always; }
            .header-print-area { padding-top: 15mm; width: 100%; }
            .content-print-area { padding: 0 25mm; flex-grow: 1; display: flex; flex-direction: column; }
            .footer-print-area { width: 100%; padding-bottom: 10mm; }
        }
        .print-only { display: none; }
        .a4-preview { width: 210mm; min-height: 297mm; background: white; margin: 2rem auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; font-family: 'Times New Roman', Times, serif; position: relative; }
        .img-full { width: 100%; height: auto; display: block; }
        .signature-img { max-height: 45px; width: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="no-print fixed left-0 top-0 h-full w-80 bg-white border-r border-slate-200 shadow-xl p-8 z-50 overflow-y-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Escola Digital</h1>
        </header>
        
        <div class="space-y-6">
            <div class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">1. Dados do Dia</h3>
                <input type="date" id="docDate" class="w-full text-sm border border-slate-200 rounded-xl p-3 bg-slate-50">
                <select id="docShift" class="w-full text-sm border border-slate-200 rounded-xl p-3 bg-slate-50">
                    <option value="matutino">Matutino</option>
                    <option value="vespertino">Vespertino</option>
                    <option value="noturno">Noturno</option>
                </select>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">2. Aluno</h3>
                <input type="text" id="searchBox" placeholder="Carregando..." class="w-full border-2 border-slate-100 rounded-2xl p-4 text-base focus:border-blue-500 outline-none" disabled>
                <div id="results" class="absolute z-50 left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-h-72 overflow-y-auto hidden"></div>
            </div>

            <div id="selectorArea" class="hidden space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">3. Declarante</h3>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 space-y-2 text-sm">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="respType" value="mae" checked onchange="handleRespChange()"> Mãe: <span id="optMae" class="font-bold"></span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="respType" value="pai" onchange="handleRespChange()"> Pai: <span id="optPai" class="font-bold"></span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="respType" value="outro" onchange="handleRespChange()"> Resp: <span id="optResp" class="font-bold"></span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="respType" value="manual" onchange="handleRespChange()"> <span class="text-blue-600 italic">Outro (Digitar...)</span></label>
                    <input type="text" id="manualName" placeholder="Nome completo" class="hidden w-full p-2 border rounded-xl text-sm" oninput="render()">
                </div>
            </div>

            <button onclick="window.print()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl">IMPRIMIR</button>
        </div>
    </div>

    <div class="lg:ml-80 flex justify-center no-print min-h-screen pb-10">
        <div id="canvas" class="a4-preview hidden">
            <div id="vHeader"></div>
            <div class="p-[15mm_25mm] flex-grow">
                <div class="text-center font-bold text-2xl mb-12 underline uppercase">DECLARAÇÃO</div>
                <div id="vBody" class="text-xl leading-[1.8] text-justify text-slate-800"></div>
                <div id="vDate" class="text-right text-lg mt-12"></div>
                <div class="mt-32 flex flex-col items-center">
                    <div id="vSign" class="h-[45px]"></div>
                    <div class="w-80 border-t border-black text-center mt-3 font-bold uppercase">Elaine Lopes da Luz Almeida</div>
                </div>
            </div>
            <div id="vFooter"></div>
        </div>
    </div>

    <script>
        let db = [];
        let selected = null;
        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            $('docDate').value = new Date().toISOString().split('T')[0];
            loadCSV();
        };

        function loadCSV() {
            fetch('CUBO.CSV')
                .then(r => r.text())
                .then(text => {
                    const lines = text.split('\n').filter(l => l.trim() !== "");
                    db = lines.slice(1).map(l => {
                        const c = l.split(';');
                        return { a: c[0]?.trim() || "", m: c[1]?.trim() || "", p: c[2]?.trim() || "", r: c[3]?.trim() || "" };
                    }).filter(i => i.a !== "");
                    if (db.length > 0) {
                        $('searchBox').disabled = false;
                        $('searchBox').placeholder = `Pesquisar em ${db.length} alunos...`;
                    }
                });
        }

        $('searchBox').oninput = function() {
            const val = this.value.toLowerCase();
            const res = $('results');
            if (val.length < 2) return res.classList.add('hidden');
            
            const m = db.filter(i => i.a.toLowerCase().includes(val) || i.m.toLowerCase().includes(val) || i.p.toLowerCase().includes(val) || i.r.toLowerCase().includes(val)).slice(0, 5);
            res.innerHTML = '';
            res.classList.toggle('hidden', m.length === 0);
            
            m.forEach(item => {
                const d = document.createElement('div');
                d.className = "p-4 hover:bg-blue-50 cursor-pointer border-b text-sm";
                d.innerHTML = `<b>${item.a}</b><div class="text-[10px] text-slate-400">Mãe: ${item.m} | Pai: ${item.p} | Resp: ${item.r}</div>`;
                d.onclick = () => {
                    selected = item;
                    $('searchBox').value = item.a;
                    res.classList.add('hidden');
                    $('canvas').classList.remove('hidden');
                    $('selectorArea').classList.remove('hidden');
                    $('optMae').innerText = item.m || "---";
                    $('optPai').innerText = item.p || "---";
                    $('optResp').innerText = item.r || "---";
                    render();
                };
                res.appendChild(d);
            });
        };

        function handleRespChange() { render(); }

        function render() {
            if (!selected) return;
            const type = document.querySelector('input[name="respType"]:checked').value;
            let declName = type === 'mae' ? selected.m : type === 'pai' ? selected.p : type === 'outro' ? selected.r : $('manualName').value;
            
            const body = `Declaro que, <strong>${declName.toUpperCase()}</strong>, compareceu nesta Unidade Escolar no dia <strong>${$('docDate').value}</strong>, para resolver assuntos relacionados a <strong>${selected.a.toUpperCase()}</strong>.`;
            $('vBody').innerHTML = body;
        }
    </script>
</body>
</html>
