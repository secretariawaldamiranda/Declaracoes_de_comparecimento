<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Declarações Escolares - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }

        /* CONFIGURAÇÕES DE IMPRESSÃO - A4 REAL */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            
            body { background: white; margin: 0; padding: 0; }
            
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            .print-page { 
                width: 210mm; 
                height: 297mm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                position: relative; 
                background: white;
                box-sizing: border-box;
                page-break-after: always;
            }
            
            .header-print-area {
                padding-top: 10mm;
                width: 100%;
            }

            .content-print-area {
                padding: 0 25mm; 
                flex-grow: 1; 
                display: flex;
                flex-direction: column;
            }

            .footer-print-area {
                width: 100%;
                padding-bottom: 10mm; 
            }
        }

        /* Estilos de visualização no Navegador */
        .print-only { display: none; }
        
        .a4-preview { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            margin: 2rem auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
        }

        .img-full { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* AJUSTE DA ASSINATURA: Tamanho reduzido para 60px para maior fidelidade ao modelo */
        .signature-img { 
            max-height: 60px; 
            width: auto; 
            display: block; 
            margin: 0 auto; 
        }

        .img-placeholder {
            border: 1px dashed #cbd5e1;
            background: #f8fafc;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Menu de Controle Lateral -->
    <div class="no-print fixed left-0 top-0 h-full w-80 bg-white border-r border-slate-200 shadow-xl p-6 z-50 overflow-y-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Escola Digital</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Ajuste de Assinatura ✨</p>
        </header>
        
        <div class="space-y-6">
            <!-- 1. Carregar Dados -->
            <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">1. Base de Dados (CSV)</label>
                <input type="file" id="csvFile" accept=".csv" class="w-full text-xs">
            </div>
            
            <!-- 2. Status das Imagens -->
            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 space-y-3">
                <label class="block text-[10px] font-bold text-blue-500 uppercase mb-1">2. Ficheiros de Imagem</label>
                <div class="text-[10px] space-y-1 text-blue-700">
                    <p id="status-h">• Cabeçalho: Procurando...</p>
                    <p id="status-f">• Rodapé: Procurando...</p>
                    <p id="status-s">• Assinatura: Procurando...</p>
                </div>
                <hr class="border-blue-200">
                <p class="text-[9px] text-blue-400 italic">Mudar manualmente:</p>
                <input type="file" id="headIn" class="w-full text-[10px]" title="Mudar Cabeçalho">
                <input type="file" id="footIn" class="w-full text-[10px]" title="Mudar Rodapé">
                <input type="file" id="signIn" class="w-full text-[10px]" title="Mudar Assinatura">
            </div>

            <!-- 3. Configurações -->
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Data</label>
                    <input type="date" id="docDate" class="text-xs border rounded p-2 outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Turno</label>
                    <select id="docShift" class="text-xs border rounded p-2 outline-none">
                        <option value="matutino">Matutino</option>
                        <option value="vespertino" selected>Vespertino</option>
                        <option value="noturno">Noturno</option>
                    </select>
                </div>
            </div>

            <!-- 4. Busca -->
            <div class="pt-2">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">3. Pesquisar Registro</label>
                <input type="text" id="searchBox" placeholder="Carregue o CSV primeiro..." class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm focus:border-blue-500 outline-none transition-all disabled:opacity-50" disabled>
                <div id="results" class="mt-2 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-y-auto hidden"></div>
            </div>

            <!-- Botão Imprimir -->
            <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                IMPRIMIR DOCUMENTO
            </button>
        </div>
    </div>

    <!-- Área de Visualização no Navegador -->
    <div class="lg:ml-80 flex justify-center no-print min-h-screen pb-10">
        <div id="canvas" class="a4-preview hidden">
            <div id="vHeader"></div>
            
            <div class="p-[15mm_25mm] flex-grow">
                <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 10mm;">DECLARAÇÃO</div>
                <div id="vBody" class="text-xl leading-[1.8] text-justify text-slate-800"></div>
                <div id="vDate" class="text-right text-lg mt-12"></div>
                
                <div class="mt-24 flex flex-col items-center">
                    <div id="vSign" class="mb-[-15px] z-10"></div>
                    <div class="w-80 border-t border-black"></div>
                    <div class="text-center mt-3">
                        <p class="font-bold uppercase text-lg">Elaine Lopes da Luz Almeida</p>
                        <p class="text-slate-500">Diretora</p>
                    </div>
                </div>
            </div>

            <div id="vFooter"></div>
        </div>
    </div>

    <!-- ÁREA DE IMPRESSÃO REAL -->
    <div class="print-only print-page">
        <div id="pHeader" class="header-print-area"></div>
        <div class="content-print-area">
            <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 5mm;">DECLARAÇÃO</div>
            <div id="pBody" class="text-[14pt] leading-[1.8] text-justify"></div>
            <div id="pDate" class="text-right text-[14pt] mt-12"></div>
            
            <div class="flex flex-col items-center" style="margin-top: 30mm;">
                <div id="pSign" class="mb-[-15px] z-10"></div>
                <div class="w-80 border-t border-black"></div>
                <div class="text-center mt-3">
                    <p class="font-bold uppercase text-[14pt]">Elaine Lopes da Luz Almeida</p>
                    <p class="text-[12pt]">Diretora</p>
                </div>
            </div>
        </div>
        
        <div id="pFooter" class="footer-print-area"></div>
    </div>

    <script>
        let db = [];
        let selected = null;
        let imgs = { h: 'cabecalho.png', s: 'assinatura.png', f: 'rodape.png' };

        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            checkAndLoadDefaultImages();
            $('docDate').value = new Date().toISOString().split('T')[0];
        };

        function checkAndLoadDefaultImages() {
            const targets = [
                { key: 'h', path: 'cabecalho.png', status: 'status-h', label: 'Cabeçalho' },
                { key: 'f', path: 'rodape.png', status: 'status-f', label: 'Rodapé' },
                { key: 's', path: 'assinatura.png', status: 'status-s', label: 'Assinatura' }
            ];

            targets.forEach(t => {
                const img = new Image();
                img.onload = () => {
                    $(t.status).innerText = `• ${t.label}: Carregado ✅`;
                    $(t.status).classList.add('text-green-600');
                    render();
                };
                img.onerror = () => {
                    $(t.status).innerText = `• ${t.label}: Não encontrado ❌`;
                    $(t.status).classList.add('text-red-400');
                    imgs[t.key] = '';
                    render();
                };
                img.src = t.path;
            });
        }

        $('csvFile').onchange = (e) => {
            const r = new FileReader();
            r.onload = ev => {
                const lines = ev.target.result.split('\n');
                db = lines.slice(1).map(l => {
                    const c = l.split(';');
                    return c.length >= 2 ? { a: c[0].trim(), m: c[1].trim() } : null;
                }).filter(Boolean);
                $('searchBox').disabled = false;
                $('searchBox').placeholder = "Pesquisar por nome...";
            };
            r.readAsText(e.target.files[0]);
        };

        const bindManualUpload = (id, key, statusId, label) => {
            $(id).onchange = e => {
                const r = new FileReader();
                r.onload = ev => { 
                    imgs[key] = ev.target.result;
                    $(statusId).innerText = `• ${label}: Carregado (Manual) 🔄`;
                    render(); 
                };
                r.readAsDataURL(e.target.files[0]);
            };
        };

        bindManualUpload('headIn', 'h', 'status-h', 'Cabeçalho'); 
        bindManualUpload('signIn', 's', 'status-s', 'Assinatura'); 
        bindManualUpload('footIn', 'f', 'status-f', 'Rodapé');

        $('searchBox').oninput = function() {
            const val = this.value.toLowerCase();
            const resDiv = $('results');
            if (val.length < 2) return resDiv.classList.add('hidden');
            const matches = db.filter(i => i.a.toLowerCase().includes(val) || i.m.toLowerCase().includes(val)).slice(0, 5);
            resDiv.innerHTML = '';
            resDiv.classList.toggle('hidden', matches.length === 0);
            matches.forEach(item => {
                const d = document.createElement('div');
                d.className = "p-3 hover:bg-blue-50 cursor-pointer border-b last:border-0 text-sm";
                d.innerHTML = `<b>${item.a}</b><br><small>Mãe: ${item.m}</small>`;
                d.onclick = () => {
                    selected = item;
                    resDiv.classList.add('hidden');
                    $('searchBox').value = item.a;
                    $('canvas').classList.remove('hidden');
                    render();
                };
                resDiv.appendChild(d);
            });
        };

        function render() {
            if (!selected) return;
            const dateVal = $('docDate').value || new Date().toISOString().split('T')[0];
            const shift = $('docShift').value;
            const months = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const [y, m, d] = dateVal.split('-');
            const fullDateStr = `${d} de ${months[parseInt(m)-1]} de ${y}`;
            
            const content = `Declaro para os devidos fins legais que, <strong>${selected.m}</strong>, compareceu nesta Unidade Escolar no dia <strong>${fullDateStr}</strong>, no turno <strong>${shift}</strong>, para resolver assuntos relacionados a <strong>${selected.a}</strong>.
            <p style="margin-top: 35px;">Por ser verdade assino a presente declaração.</p>`;
            
            const dateLine = `Formosa-GO, ${fullDateStr}.`;

            ['v', 'p'].forEach(prefix => {
                $(prefix + 'Body').innerHTML = content;
                $(prefix + 'Date').innerText = dateLine;
                $(prefix + 'Header').innerHTML = imgs.h ? `<img src="${imgs.h}" class="img-full">` : '';
                $(prefix + 'Footer').innerHTML = imgs.f ? `<img src="${imgs.f}" class="img-full">` : '';
                $(prefix + 'Sign').innerHTML = imgs.s ? `<img src="${imgs.s}" class="signature-img">` : '';
            });
        }

        $('docDate').onchange = () => render();
        $('docShift').onchange = () => render();
    </script>
</body>
</html>
