<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Declarações Escolares - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
        }

        /* CONFIGURAÇÕES DE IMPRESSÃO - A4 REAL */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            
            body { background: white; margin: 0; padding: 0; }
            
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            .print-page { 
                width: 210mm; 
                height: 297mm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                position: relative; 
                background: white;
                box-sizing: border-box;
                page-break-after: always;
            }
            
            .header-print-area {
                padding-top: 15mm;
                width: 100%;
            }

            .content-print-area {
                padding: 0 25mm; 
                flex-grow: 1; 
                display: flex;
                flex-direction: column;
            }

            .footer-print-area {
                width: 100%;
                padding-bottom: 10mm; 
            }
        }

        .print-only { display: none; }
        
        .a4-preview { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            margin: 2rem auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
        }

        .img-full { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        .signature-img { 
            max-height: 45px; 
            width: auto; 
            display: block; 
            margin: 0 auto; 
        }
    </style>
</head>
<body>

    <!-- Menu Lateral Simplificado -->
    <div class="no-print fixed left-0 top-0 h-full w-80 bg-white border-r border-slate-200 shadow-xl p-8 z-50 overflow-y-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Escola Digital</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Versão Corrigida ✨</p>
        </header>
        
        <div class="space-y-8">
            
            <!-- 1. Configurações -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">1. Dados do Documento</h3>
                <div class="grid grid-cols-1 gap-4">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Data</label>
                        <input type="date" id="docDate" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Turno</label>
                        <select id="docShift" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-slate-50 font-medium">
                            <option value="matutino">Matutino</option>
                            <option value="vespertino">Vespertino</option>
                            <option value="noturno">Noturno</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 2. Pesquisa -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">2. Selecionar Aluno</h3>
                <div class="relative">
                    <input type="text" id="searchBox" placeholder="Carregando CUBO.CSV..." class="w-full border-2 border-slate-100 rounded-2xl p-4 text-base focus:border-blue-500 outline-none transition-all shadow-sm disabled:bg-slate-50 disabled:cursor-not-allowed" disabled>
                    <div id="results" class="absolute z-50 left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-h-96 overflow-y-auto hidden"></div>
                </div>
            </div>

            <!-- 3. Responsável -->
            <div id="selectorArea" class="hidden space-y-4 animate-in slide-in-from-top duration-300">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">3. Declarante</h3>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 space-y-3">
                    <div class="space-y-2 text-sm">

                        <label id="labelMae" class="flex items-center gap-2 cursor-pointer">
                            <input id="radioMae" type="radio" name="respType" value="mae" onchange="handleRespChange()">
                            <span class="text-slate-700">Mãe: <span id="optMae" class="font-bold"></span></span>
                        </label>

                        <label id="labelPai" class="flex items-center gap-2 cursor-pointer">
                            <input id="radioPai" type="radio" name="respType" value="pai" onchange="handleRespChange()">
                            <span class="text-slate-700">Pai: <span id="optPai" class="font-bold"></span></span>
                        </label>

                        <label id="labelResp" class="flex items-center gap-2 cursor-pointer">
                            <input id="radioResp" type="radio" name="respType" value="outro" onchange="handleRespChange()">
                            <span class="text-slate-700">Responsável: <span id="optResp" class="font-bold"></span></span>
                        </label>

                        <label class="flex items-center gap-2 cursor-pointer">
                            <input id="radioManual" type="radio" name="respType" value="manual" onchange="handleRespChange()">
                            <span class="font-medium text-blue-600 italic">Outro (digitar nome...)</span>
                        </label>

                    </div>
                    
                    <input type="text" id="manualName" placeholder="Digite o nome completo" class="hidden w-full p-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-400" oninput="render()">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100">
                <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 text-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    IMPRIMIR
                </button>
            </div>
        </div>
    </div>

    <!-- Visualização no Navegador -->
    <div class="lg:ml-80 flex justify-center no-print min-h-screen pb-10">
        <div id="canvas" class="a4-preview hidden">
            <div id="vHeader"></div>
            
            <div class="p-[15mm_25mm] flex-grow">
                <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 10mm;">DECLARAÇÃO</div>
                <div id="vBody" class="text-xl leading-[1.8] text-justify text-slate-800"></div>
                <div id="vDate" class="text-right text-lg mt-12"></div>
                
                <div class="mt-32 flex flex-col items-center">
                    <div id="vSign" class="relative z-0 h-[45px] flex items-end -mb-[18px]"></div>
                    <div class="w-80 border-t border-black relative z-10"></div>
                    <div class="text-center mt-3">
                        <p class="font-bold uppercase text-lg">Elaine Lopes da Luz Almeida</p>
                        <p class="text-slate-500">Diretora</p>
                    </div>
                </div>
            </div>

            <div id="vFooter" class="mt-auto"></div>
        </div>

        <div id="empty-state" class="flex flex-col items-center justify-center text-slate-300 mt-40">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-4 opacity-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" />
            </svg>
            <p class="text-lg opacity-40 italic">Pesquise o nome do aluno para começar</p>
        </div>
    </div>

    <!-- ÁREA DE IMPRESSÃO REAL -->
    <div class="print-only print-page">
        <div id="pHeader" class="header-print-area"></div>
        <div class="content-print-area">
            <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 10mm;">DECLARAÇÃO</div>
            <div id="pBody" class="text-[14pt] leading-[1.8] text-justify"></div>
            <div id="pDate" class="text-right text-[14pt] mt-12"></div>
            
            <div class="flex flex-col items-center" style="margin-top: 40mm;">
                <div id="pSign" class="relative z-0 h-[45px] flex items-end -mb-[18px]"></div>
                <div class="w-80 border-t border-black relative z-10"></div>
                <div class="text-center mt-3">
                    <p class="font-bold uppercase text-[14pt]">Elaine Lopes da Luz Almeida</p>
                    <p class="text-[12pt]">Diretora</p>
                </div>
            </div>
        </div>
        
        <div id="pFooter" class="footer-print-area"></div>
    </div>

    <script>
        let db = [];
        let selected = null;
        let imgs = { h: 'cabecalho.png', s: 'assinatura.png', f: 'rodape.png' };

        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            const agora = new Date();
            const offset = agora.getTimezoneOffset();
            const dataLocal = new Date(agora.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
            $('docDate').value = dataLocal;

            const hora = agora.getHours();
            let turno = "noturno";

            if (hora >= 5 && hora < 12) {
                turno = "matutino";
            } else if (hora >= 12 && hora < 18) {
                turno = "vespertino";
            }

            $('docShift').value = turno;

            loadAssets();
            checkAndLoadDefaultCSV();
        };

        function normalizeText(text) {
            return String(text || "")
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim();
        }

        function escapeHTML(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function isFilled(value) {
            const v = String(value || "").trim().toLowerCase();

            return (
                v !== "" &&
                v !== "-" &&
                v !== "null" &&
                v !== "undefined" &&
                v !== "não informado" &&
                v !== "nao informado"
            );
        }

        function checkAndLoadDefaultCSV() {
            fetch('CUBO.CSV')
                .then(response => {
                    if (!response.ok) throw new Error("Arquivo não encontrado");
                    return response.text();
                })
                .then(text => parseCSV(text))
                .catch(err => {
                    console.error(err);
                    $('searchBox').placeholder = "CUBO.CSV não encontrado no GitHub.";
                });
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim() !== "");

            if (lines.length < 1) {
                $('searchBox').placeholder = "CSV vazio ou inválido.";
                return;
            }

            const headers = lines[0].split(';').map(h => normalizeText(h));
            
            const idx = {
                aluno: headers.indexOf("aluno"),
                mae: headers.findIndex(h => h.includes("mae")),
                pai: headers.indexOf("pai"),
                resp: headers.findIndex(h => h.includes("responsavel"))
            };

            db = lines.slice(1).map(l => {
                const c = l.split(';');

                return {
                    a: idx.aluno !== -1 ? (c[idx.aluno] || "").trim() : (c[0] || "").trim(),
                    m: idx.mae !== -1 ? (c[idx.mae] || "").trim() : (c[1] || "").trim(),
                    p: idx.pai !== -1 ? (c[idx.pai] || "").trim() : "",
                    r: idx.resp !== -1 ? (c[idx.resp] || "").trim() : ""
                };
            }).filter(item => item.a !== "");
            
            if (db.length > 0) {
                $('searchBox').disabled = false;
                $('searchBox').placeholder = `Pesquisar em ${db.length} nomes...`;
            } else {
                $('searchBox').placeholder = "CSV está vazio ou inválido.";
            }
        }

        function loadAssets() {
            const targets = [
                { k: 'h', p: 'cabecalho.png' },
                { k: 'f', p: 'rodape.png' },
                { k: 's', p: 'assinatura.png' }
            ];

            targets.forEach(t => {
                const i = new Image();

                i.onload = () => render();
                i.onerror = () => {
                    imgs[t.k] = '';
                    render();
                };

                i.src = t.p;
            });
        }

        function showResponsibleOptions(item) {
            const options = [
                {
                    type: "mae",
                    labelId: "labelMae",
                    radioId: "radioMae",
                    textId: "optMae",
                    value: item.m
                },
                {
                    type: "pai",
                    labelId: "labelPai",
                    radioId: "radioPai",
                    textId: "optPai",
                    value: item.p
                },
                {
                    type: "outro",
                    labelId: "labelResp",
                    radioId: "radioResp",
                    textId: "optResp",
                    value: item.r
                }
            ];

            let firstAvailableType = "";

            options.forEach(option => {
                const hasValue = isFilled(option.value);

                $(option.labelId).classList.toggle("hidden", !hasValue);
                $(option.radioId).disabled = !hasValue;
                $(option.textId).innerText = hasValue ? option.value : "";

                if (hasValue && firstAvailableType === "") {
                    firstAvailableType = option.type;
                }
            });

            const selectedType = firstAvailableType || "manual";
            const radio = document.querySelector(`input[name="respType"][value="${selectedType}"]`);

            if (radio) {
                radio.checked = true;
            }

            $('manualName').classList.toggle('hidden', selectedType !== 'manual');

            if (selectedType === 'manual') {
                $('manualName').focus();
            }
        }

        $('searchBox').oninput = function() {
            const val = normalizeText(this.value);
            const res = $('results');

            res.innerHTML = '';

            if (val.length < 2) {
                res.classList.add('hidden');
                return;
            }

            const matches = db.filter(item => {
                const aluno = normalizeText(item.a);
                const mae = normalizeText(item.m);
                const pai = normalizeText(item.p);
                const resp = normalizeText(item.r);

                return (
                    aluno.includes(val) ||
                    mae.includes(val) ||
                    pai.includes(val) ||
                    resp.includes(val)
                );
            });

            const limit = 20;
            const shown = matches.slice(0, limit);

            res.classList.remove('hidden');

            if (shown.length === 0) {
                res.innerHTML = `
                    <div class="p-4 text-sm text-slate-500 italic">
                        Nenhum aluno encontrado.
                    </div>
                `;
                return;
            }

            shown.forEach(item => {
                const d = document.createElement('div');

                const infoParts = [];

                if (isFilled(item.m)) infoParts.push(`Mãe: ${escapeHTML(item.m)}`);
                if (isFilled(item.p)) infoParts.push(`Pai: ${escapeHTML(item.p)}`);
                if (isFilled(item.r)) infoParts.push(`Responsável: ${escapeHTML(item.r)}`);

                d.className = "p-4 hover:bg-blue-50 cursor-pointer border-b last:border-0 text-sm transition-colors";
                d.innerHTML = `
                    <div>
                        <b class="text-slate-800 uppercase">${escapeHTML(item.a)}</b>
                    </div>
                    <div class="text-[10px] text-slate-400 uppercase font-bold mt-1">
                        ${infoParts.length > 0 ? infoParts.join(" • ") : "Sem responsável cadastrado"}
                    </div>
                `;

                d.onclick = () => {
                    selected = item;

                    $('searchBox').value = item.a;
                    res.classList.add('hidden');
                    $('canvas').classList.remove('hidden');
                    $('empty-state').classList.add('hidden');
                    $('selectorArea').classList.remove('hidden');

                    $('manualName').value = "";

                    showResponsibleOptions(item);
                    render();
                };

                res.appendChild(d);
            });

            if (matches.length > limit) {
                const aviso = document.createElement('div');

                aviso.className = "p-3 text-center text-[11px] text-slate-500 bg-slate-50 font-semibold";
                aviso.innerText = `Mostrando ${limit} de ${matches.length} resultados. Digite mais letras para filtrar melhor.`;

                res.appendChild(aviso);
            }
        };

        function handleRespChange() {
            const selectedRadio = document.querySelector('input[name="respType"]:checked');

            if (!selectedRadio) return;

            const v = selectedRadio.value;

            $('manualName').classList.toggle('hidden', v !== 'manual');

            if (v === 'manual') {
                $('manualName').focus();
            }

            render();
        }

        function getDateText() {
            const dv = $('docDate').value;
            const meses = [
                "janeiro",
                "fevereiro",
                "março",
                "abril",
                "maio",
                "junho",
                "julho",
                "agosto",
                "setembro",
                "outubro",
                "novembro",
                "dezembro"
            ];

            if (!dv) {
                return "____ de __________________ de ______";
            }

            const [y, m, d] = dv.split('-');
            const monthIndex = parseInt(m, 10) - 1;

            if (!y || !m || !d || monthIndex < 0 || monthIndex > 11) {
                return "____ de __________________ de ______";
            }

            return `${d} de ${meses[monthIndex]} de ${y}`;
        }

        function render() {
            if (!selected) return;

            const dataExt = getDateText();
            const turno = $('docShift').value;

            const selectedRadio = document.querySelector('input[name="respType"]:checked');

            if (!selectedRadio) return;

            const type = selectedRadio.value;

            let declName = "";

            if (type === 'mae') {
                declName = selected.m;
            } else if (type === 'pai') {
                declName = selected.p;
            } else if (type === 'outro') {
                declName = selected.r;
            } else {
                declName = $('manualName').value;
            }

            if (!isFilled(declName)) {
                declName = "____________________";
            }

            const body = `
                Declaro para os devidos fins legais que, 
                <strong>${escapeHTML(declName.toUpperCase())}</strong>, 
                compareceu nesta Unidade Escolar no dia 
                <strong>${escapeHTML(dataExt)}</strong>, 
                no turno 
                <strong>${escapeHTML(turno)}</strong>, 
                para resolver assuntos relacionados a 
                <strong>${escapeHTML(selected.a.toUpperCase())}</strong>.
                <p style="margin-top: 35px;">Por ser verdade assino a presente declaração.</p>
            `;
            
            const city = `Formosa-GO, ${dataExt}.`;

            ['v', 'p'].forEach(prefix => {
                $(prefix + 'Body').innerHTML = body;
                $(prefix + 'Date').innerText = city;
                $(prefix + 'Header').innerHTML = imgs.h ? `<img src="${imgs.h}" class="img-full">` : '';
                $(prefix + 'Footer').innerHTML = imgs.f ? `<img src="${imgs.f}" class="img-full">` : '';
                $(prefix + 'Sign').innerHTML = imgs.s ? `<img src="${imgs.s}" class="signature-img">` : '';
            });
        }

        $('docDate').onchange = () => render();
        $('docShift').onchange = () => render();
    </script>
</body>
</html>
