<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Declarações Escolares - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* ====================== ESTILOS NORMAIS ====================== */
        .preview-area {
            width: 100%;
            overflow-x: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        #canvas { 
            width: 210mm; 
            min-height: 297mm;
            background: white; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
            flex-shrink: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        .img-header-footer { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        .signature-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25mm;
        }

        .signature-img { 
            max-height: 45px; 
            width: auto; 
            margin-bottom: -18px; 
            position: relative;
            z-index: 2;
        }

        .signature-line {
            width: 85mm;
            border-top: 1.5px solid black;
            position: relative;
            z-index: 1;
        }

        /* ====================== IMPRESSÃO (CORRIGIDO) ====================== */
        @media print {
            @page { 
                size: A4 portrait;
                margin: 0;
            }

            .no-print { 
                display: none !important; 
            }

            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                height: auto !important;
            }

            #canvas {
                display: flex !important;
                flex-direction: column !important;
                width: 210mm !important;
                min-height: 297mm !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                page-break-after: avoid;
                page-break-inside: avoid;
                background: white !important;
                overflow: visible !important;
                box-sizing: border-box;
            }

            .img-header-footer,
            .signature-img {
                display: block !important;
                visibility: visible !important;
                max-width: 100% !important;
                height: auto !important;
            }

            .p-\\[15mm_25mm\\] {
                padding: 15mm 25mm !important;
            }
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <!-- Menu de Controle -->
    <div class="no-print w-full lg:w-80 lg:fixed lg:h-full bg-white border-r border-slate-200 shadow-xl p-6 z-50 overflow-y-auto">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-800">Escola Digital</h1>
            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Impressão 1 para 1 🖨️</p>
        </header>
        
        <div class="space-y-6">
            <!-- Seus campos de Data, Turno, Aluno, etc... (mantive igual) -->
            <div class="grid grid-cols-2 lg:grid-cols-1 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Data</label>
                    <input type="date" id="docDate" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Turno</label>
                    <select id="docShift" class="w-full text-sm border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                        <option value="matutino">Matutino</option>
                        <option value="vespertino">Vespertino</option>
                        <option value="noturno">Noturno</option>
                    </select>
                </div>
            </div>

            <!-- ... resto do menu igual (busca, responsáveis, botão) ... -->
            <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                IMPRIMIR
            </button>
        </div>
    </div>

    <!-- Área da Folha -->
    <div class="flex-1 lg:ml-80">
        <div class="preview-area no-print">
            <div id="canvas" class="hidden">
                <div id="vHeader"></div>
                <div class="p-[15mm_25mm] flex-grow">
                    <div class="text-center font-bold text-2xl mb-12 underline uppercase tracking-widest" style="margin-top: 15mm;">DECLARAÇÃO</div>
                    <div id="vBody" class="text-xl leading-[1.8] text-justify text-slate-800"></div>
                    <div id="vDate" class="text-right text-lg mt-12"></div>
                    
                    <div class="signature-box">
                        <div id="vSign"></div>
                        <div class="signature-line"></div>
                        <div class="text-center mt-3">
                            <p class="font-bold uppercase text-lg">Elaine Lopes da Luz Almeida</p>
                            <p class="text-slate-500">Diretora</p>
                        </div>
                    </div>
                </div>
                <div id="vFooter"></div>
            </div>

            <div id="empty-state" class="flex flex-col items-center justify-center text-slate-300 mt-40">
                <p class="text-lg opacity-40 italic">Inicie a pesquisa para preencher o documento.</p>
            </div>
        </div>
    </div>

    <script>
        // Seu JavaScript (melhorei só o carregamento das imagens)
        let db = [];
        let selectedAluno = null;
        let images = { h: 'cabecalho.png', s: 'assinatura.png', f: 'rodape.png' };

        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            const agora = new Date();
            const dataLocal = new Date(agora.getTime() - (agora.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            $('docDate').value = dataLocal;

            const h = agora.getHours();
            let turno = "noturno";
            if (h >= 5 && h < 12) turno = "matutino";
            else if (h >= 12 && h < 18) turno = "vespertino";
            $('docShift').value = turno;

            fetch('CUBO.CSV').then(r => r.text()).then(t => parseCSV(t)).catch(() => {
                $('searchBox').placeholder = "CUBO.CSV não encontrado.";
            });
            loadAssets();
        };

        function loadAssets() {
            Object.keys(images).forEach(key => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => render();
                img.onerror = () => { 
                    console.warn(`Imagem não carregada: ${images[key]}`);
                    images[key] = ''; 
                    render(); 
                };
                img.src = images[key];
            });
        }

        // ... resto do seu script (parseCSV, search, render) continua igual ...

        function render() {
            if (!selectedAluno) return;
            // (seu código de renderização continua o mesmo)
            const dv = $('docDate').value;
            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const [y, m, d] = dv.split('-');
            const dataExt = `${d} de ${meses[parseInt(m)-1]} de ${y}`;
            const turno = $('docShift').value;

            const resp = document.querySelector('input[name="resp"]:checked').value;
            let nomeDeclarante = "";
            const mInp = $('manualName');
            mInp.classList.toggle('hidden', resp !== 'manual');
            
            if (resp === 'mae') nomeDeclarante = selectedAluno.m;
            else if (resp === 'pai') nomeDeclarante = selectedAluno.p;
            else if (resp === 'outro') nomeDeclarante = selectedAluno.r;
            else nomeDeclarante = mInp.value || "____________________";

            \( ('vBody').innerHTML = `Declaro para os devidos fins legais que, <strong> \){nomeDeclarante.toUpperCase()}</strong>, compareceu nesta Unidade Escolar no dia <strong>\( {dataExt}</strong>, no turno <strong> \){turno}</strong>, para resolver assuntos relacionados a <strong>${selectedAluno.a.toUpperCase()}</strong>.<p style="margin-top: 35px;">Por ser verdade assino a presente declaração.</p>`;
            $('vDate').innerText = `Formosa-GO, ${dataExt}.`;
            \( ('vHeader').innerHTML = images.h ? `<img src=" \){images.h}" class="img-header-footer">` : '';
            \( ('vFooter').innerHTML = images.f ? `<img src=" \){images.f}" class="img-header-footer">` : '';
            \( ('vSign').innerHTML = images.s ? `<img src=" \){images.s}" class="signature-img">` : '';
        }

        // Seus outros event listeners...
    </script>
</body>
</html>
